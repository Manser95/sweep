name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build DMG & publish release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Safety & localization self-checks
        run: swift run Sweep --dryrun

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/make-dmg.sh "$VERSION"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/Sweep-${VERSION}.dmg" \
            --title "Sweep $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
