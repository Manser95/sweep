name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & self-check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Safety & localization self-checks
        run: swift run Sweep --dryrun

      - name: Build release bundle
        run: ./scripts/bundle.sh release

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Sweep.app
          path: dist/Sweep.app
          if-no-files-found: error
