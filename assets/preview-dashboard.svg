<svg width="920" height="660" viewBox="0 0 920 660" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="devbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#AF52DE"/>
      <stop offset="1" stop-color="#FF2D92"/>
    </linearGradient>
    <filter id="winShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Window -->
  <rect x="6" y="4" width="908" height="648" rx="16" fill="#202024" stroke="#37373b" stroke-width="1" filter="url(#winShadow)"/>

  <!-- Sidebar -->
  <path d="M254 4 L22 4 Q6 4 6 20 L6 636 Q6 652 22 652 L254 652 Z" fill="#19191c"/>
  <line x1="254" y1="4" x2="254" y2="652" stroke="#37373b" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="26" r="6.5" fill="#FF5F57"/>
  <circle cx="50" cy="26" r="6.5" fill="#FEBC2E"/>
  <circle cx="72" cy="26" r="6.5" fill="#28C840"/>

  <!-- Toolbar (main side) -->
  <text x="282" y="31" fill="#9a9aa0" font-size="13" font-weight="600">Sweep</text>
  <circle cx="846" cy="26" r="9" fill="none" stroke="#5a5a60" stroke-width="1.6"/>
  <line x1="852" y1="32" x2="858" y2="38" stroke="#5a5a60" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="888" cy="26" r="10" fill="#2c2c31"/>
  <circle cx="888" cy="26" r="6" fill="none" stroke="#9a9aa0" stroke-width="1.3"/>
  <line x1="882" y1="26" x2="894" y2="26" stroke="#9a9aa0" stroke-width="1.1"/>
  <line x1="888" y1="20" x2="888" y2="32" stroke="#9a9aa0" stroke-width="1.1"/>

  <!-- Sidebar: Dashboard (selected) -->
  <rect x="12" y="62" width="236" height="32" rx="8" fill="#0A84FF"/>
  <circle cx="30" cy="78" r="7" fill="none" stroke="#ffffff" stroke-width="1.6"/>
  <line x1="30" y1="78" x2="34" y2="74" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  <text x="46" y="83" fill="#ffffff" font-size="13.5" font-weight="600">Dashboard</text>

  <!-- Sidebar: Cleanup section -->
  <text x="20" y="120" fill="#6e6e74" font-size="10.5" font-weight="700" letter-spacing="0.6">CLEANUP</text>

  <g font-size="13" fill="#d8d8dc">
    <rect x="20" y="132" width="14" height="14" rx="4" fill="#0A84FF"/>
    <text x="44" y="143">Application Caches</text>
    <text x="238" y="143" fill="#8e8e93" font-size="11.5" text-anchor="end">3.86 GB</text>

    <rect x="20" y="162" width="14" height="14" rx="4" fill="#FF9F0A"/>
    <text x="44" y="173">Logs &amp; Crash Re…</text>
    <text x="238" y="173" fill="#8e8e93" font-size="11.5" text-anchor="end">312.7 MB</text>

    <rect x="20" y="192" width="14" height="14" rx="4" fill="#FF453A"/>
    <text x="44" y="203">Trash</text>

    <rect x="20" y="222" width="14" height="14" rx="4" fill="#BF5AF2"/>
    <text x="44" y="233">Developer Junk</text>
    <text x="238" y="233" fill="#8e8e93" font-size="11.5" text-anchor="end">8.56 GB</text>
  </g>

  <!-- Sidebar: System section -->
  <text x="20" y="270" fill="#6e6e74" font-size="10.5" font-weight="700" letter-spacing="0.6">SYSTEM</text>
  <rect x="20" y="282" width="14" height="14" rx="4" fill="#30D158"/>
  <text x="44" y="293" fill="#d8d8dc" font-size="13">Memory (RAM)</text>

  <!-- Sidebar bottom: selected + clean -->
  <line x1="12" y1="600" x2="242" y2="600" stroke="#2e2e33" stroke-width="1"/>
  <text x="20" y="622" fill="#8e8e93" font-size="10.5">Selected</text>
  <text x="20" y="640" fill="#ffffff" font-size="14" font-weight="700">5.53 GB</text>
  <rect x="160" y="616" width="82" height="28" rx="8" fill="#0A84FF"/>
  <text x="201" y="635" fill="#ffffff" font-size="12.5" font-weight="600" text-anchor="middle">Clean</text>

  <!-- ===== Main content ===== -->
  <!-- Heading -->
  <path d="M286 92 l4 -12 l4 12 l12 4 l-12 4 l-4 12 l-4 -12 l-12 -4 z" fill="#0A84FF"/>
  <text x="312" y="102" fill="#ffffff" font-size="30" font-weight="800">Sweep</text>
  <text x="286" y="128" fill="#8e8e93" font-size="13">A safe, transparent cleaner for macOS. Nothing is removed without your review.</text>

  <!-- Disk card -->
  <rect x="286" y="150" width="600" height="62" rx="12" fill="#2a2a2f"/>
  <rect x="306" y="169" width="18" height="13" rx="3" fill="none" stroke="#9a9aa0" stroke-width="1.4"/>
  <circle cx="320" cy="178.5" r="1.4" fill="#9a9aa0"/>
  <text x="332" y="179" fill="#9a9aa0" font-size="12.5">Free disk</text>
  <text x="866" y="178" fill="#9a9aa0" font-size="12.5" text-anchor="end">28.11 GB of 494.38 GB</text>
  <rect x="306" y="190" width="560" height="8" rx="4" fill="#3a3a40"/>
  <rect x="306" y="190" width="527" height="8" rx="4" fill="#0A84FF"/>

  <!-- Ring -->
  <circle cx="352" cy="288" r="46" fill="none" stroke="#0A84FF" stroke-opacity="0.18" stroke-width="11"/>
  <circle cx="352" cy="288" r="46" fill="none" stroke="#0A84FF" stroke-width="11" stroke-linecap="round"
          stroke-dasharray="289" stroke-dashoffset="0" transform="rotate(-90 352 288)"/>
  <text x="352" y="286" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">12.73 GB</text>
  <text x="352" y="302" fill="#8e8e93" font-size="10" text-anchor="middle">found</text>

  <!-- Stat tiles -->
  <rect x="430" y="242" width="456" height="44" rx="10" fill="#2a2a2f"/>
  <text x="448" y="262" fill="#8e8e93" font-size="11">Reclaimable</text>
  <text x="448" y="279" fill="#ffffff" font-size="15" font-weight="700">12.73 GB</text>

  <rect x="430" y="292" width="456" height="44" rx="10" fill="#2a2a2f"/>
  <text x="448" y="312" fill="#8e8e93" font-size="11">Selected</text>
  <text x="448" y="329" fill="#30D158" font-size="15" font-weight="700">5.53 GB</text>

  <!-- By category -->
  <text x="286" y="378" fill="#ffffff" font-size="15" font-weight="700">By category</text>

  <g>
    <text x="286" y="404" fill="#d8d8dc" font-size="12.5">Application Caches</text>
    <text x="886" y="404" fill="#8e8e93" font-size="12" text-anchor="end">3.86 GB</text>
    <rect x="286" y="412" width="600" height="8" rx="4" fill="#0A84FF" fill-opacity="0.16"/>
    <rect x="286" y="412" width="182" height="8" rx="4" fill="#0A84FF"/>

    <text x="286" y="442" fill="#d8d8dc" font-size="12.5">Logs &amp; Crash Reports</text>
    <text x="886" y="442" fill="#8e8e93" font-size="12" text-anchor="end">312.7 MB</text>
    <rect x="286" y="450" width="600" height="8" rx="4" fill="#FF9F0A" fill-opacity="0.16"/>
    <rect x="286" y="450" width="22" height="8" rx="4" fill="#FF9F0A"/>

    <text x="286" y="480" fill="#d8d8dc" font-size="12.5">Developer Junk</text>
    <text x="886" y="480" fill="#8e8e93" font-size="12" text-anchor="end">8.56 GB</text>
    <rect x="286" y="488" width="600" height="8" rx="4" fill="url(#devbar)" fill-opacity="0.16"/>
    <rect x="286" y="488" width="403" height="8" rx="4" fill="url(#devbar)"/>
  </g>

  <!-- Clean button -->
  <rect x="286" y="520" width="600" height="40" rx="10" fill="#0A84FF"/>
  <path d="M566 540 l3 -9 l3 9 l9 3 l-9 3 l-3 9 l-3 -9 l-9 -3 z" fill="#ffffff"/>
  <text x="586" y="545" fill="#ffffff" font-size="14" font-weight="700">Clean 5.53 GB</text>
</svg>
